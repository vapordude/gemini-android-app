name: Build Android APK

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee gradle-debug.log
          status=${PIPESTATUS[0]}
          exit $status

      - name: Surface gradle error on failure
        if: failure()
        run: |
          if [ -f gradle-debug.log ]; then
            echo "::group::Last 200 lines of gradle output"
            tail -n 200 gradle-debug.log
            echo "::endgroup::"
            # Promote each meaningful error line to a GitHub annotation
            grep -E "(e: |error: |FAILURE:|Execution failed|What went wrong|Caused by:|> Task .* FAILED)" gradle-debug.log | head -n 50 | while IFS= read -r line; do
              # Strip ANSI color codes
              clean=$(printf '%s' "$line" | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g')
              echo "::error::${clean}"
            done
          fi

      - name: Upload gradle log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-debug-log
          path: gradle-debug.log
          if-no-files-found: warn

      - name: Assemble release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gemini-android-app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: gemini-android-app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
